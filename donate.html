<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DarkRevolt - Донат</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0b0f14;
      --bg1: #111823;
      --panel: #161f2c;
      --line: #2f3f54;
      --text: #e5edf7;
      --muted: #97a9bd;
      --green: #65d96c;
      --green-dark: #3d9d43;
      --gold: #f4ca63;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: Rubik, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(101, 217, 108, 0.17), transparent 38%),
        radial-gradient(circle at 84% 88%, rgba(95, 147, 201, 0.12), transparent 34%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.18;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #243144;
      background: rgba(10, 14, 20, 0.86);
      backdrop-filter: blur(6px);
    }

    .brand {
      font-family: "Press Start 2P", cursive;
      font-size: 11px;
      color: #c9ffd1;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .back-btn {
      border: 1px solid #3f5977;
      border-radius: 9px;
      background: linear-gradient(180deg, #2a3f57, #1b2a3b);
      color: #e9f4ff;
      padding: 9px 12px;
      font-weight: 700;
      text-decoration: none;
    }

    .layout {
      width: min(1120px, 94vw);
      margin: 20px auto 26px;
    }

    .hero {
      background: linear-gradient(180deg, rgba(23, 34, 48, 0.93), rgba(17, 25, 36, 0.95));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-family: "Press Start 2P", cursive;
      font-size: clamp(20px, 3.2vw, 32px);
      line-height: 1.2;
      color: #ceffd5;
      text-shadow: 0 0 12px rgba(101, 217, 108, 0.35);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      margin: 0;
      font-size: 24px;
      color: #dbecff;
    }

    .price {
      margin-top: 8px;
      font-size: 26px;
      font-weight: 800;
      color: var(--gold);
    }

    .features-title {
      margin: 14px 0 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .features {
      margin: 0 0 14px;
      padding-left: 18px;
      color: #d3e4f7;
      line-height: 1.6;
    }

    .buy-btn {
      width: 100%;
      border: 1px solid #3f8e43;
      border-radius: 10px;
      background: linear-gradient(180deg, #59c75f, var(--green-dark));
      color: #fff;
      padding: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    @media (max-width: 760px) {
      .layout {
        margin: 14px auto 20px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 22px;
      }

      .subtitle {
        font-size: 14px;
      }

      .card h2 {
        font-size: 22px;
      }

      .price {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">DarkRevolt</div>
    <a class="back-btn" href="index.html">На главную</a>
  </header>

  <main class="layout">
    <section class="hero">
      <h1 class="title">Донат</h1>
      <p class="subtitle">Выберите привилегию. Оплата пока не подключена, кнопки только для интерфейса.</p>
    </section>

    <section class="cards">
      <article class="card">
        <h2>VIP</h2>
        <div class="price">4700₸</div>
        <div class="features-title">Возможности</div>
        <ul class="features">
          <li>/fly</li>
          <li>kits</li>
          <li>colored chat</li>
        </ul>
        <button class="buy-btn" type="button">Купить</button>
      </article>

      <article class="card">
        <h2>Premium</h2>
        <div class="price">11750₸</div>
        <div class="features-title">Возможности</div>
        <ul class="features">
          <li>Все из VIP</li>
          <li>/ec</li>
          <li>/hat</li>
        </ul>
        <button class="buy-btn" type="button">Купить</button>
      </article>

      <article class="card">
        <h2>Legend</h2>
        <div class="price">23500₸</div>
        <div class="features-title">Возможности</div>
        <ul class="features">
          <li>Все из Premium</li>
          <li>Доступ к варпам</li>
        </ul>
        <button class="buy-btn" type="button">Купить</button>
      </article>
    </section>
  </main>
</body>
</html>
