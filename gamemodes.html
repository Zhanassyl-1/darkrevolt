<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DarkRevolt - Режимы игры</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0b0f14;
      --bg1: #111823;
      --panel: #161f2c;
      --panel-2: #1b2736;
      --line: #2f3f54;
      --text: #e5edf7;
      --muted: #97a9bd;
      --green: #65d96c;
      --accent: #6eb5ff;
      --gold: #f4ca63;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: Rubik, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(101, 217, 108, 0.17), transparent 38%),
        radial-gradient(circle at 84% 88%, rgba(95, 147, 201, 0.12), transparent 34%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.18;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .layout {
      width: min(980px, 94vw);
      margin: 18px auto 24px;
      display: grid;
      gap: 12px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(23, 34, 48, 0.93), rgba(17, 25, 36, 0.95));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .brand {
      font-family: "Press Start 2P", cursive;
      font-size: 11px;
      color: #c9ffd1;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .back {
      border: 1px solid #3f5977;
      border-radius: 9px;
      background: linear-gradient(180deg, #2a3f57, #1b2a3b);
      color: #e9f4ff;
      padding: 9px 12px;
      text-decoration: none;
      font-weight: 700;
    }

    .title {
      margin: 0;
      font-family: "Press Start 2P", cursive;
      font-size: clamp(20px, 3vw, 32px);
      color: #ceffd5;
      line-height: 1.2;
      text-shadow: 0 0 12px rgba(101, 217, 108, 0.35);
    }

    .mode-image {
      margin-top: 12px;
      height: 200px;
      border-radius: 12px;
      border: 1px solid #335071;
      background:
        linear-gradient(120deg, #3a6ca1, #203a5b 50%, #14263f),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.08), rgba(255,255,255,0.08) 8px, transparent 8px, transparent 16px);
      display: flex;
      align-items: flex-end;
      padding: 12px;
      font-family: "Press Start 2P", cursive;
      color: #eaf7ff;
      font-size: 16px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #dcedff;
    }

    .description {
      margin: 0;
      color: #d4e4f4;
      line-height: 1.6;
      font-size: 15px;
    }

    .rules {
      margin: 0;
      padding-left: 20px;
      color: #d4e4f4;
      line-height: 1.7;
    }

    .rules li { margin-bottom: 6px; }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #304157;
      border-radius: 10px;
      background: var(--panel-2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    th,
    td {
      padding: 11px 10px;
      border-bottom: 1px solid #304157;
      text-align: left;
    }

    th {
      background: #1f2e41;
      color: #cfe7ff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 12px;
    }

    .kills { color: var(--green); font-weight: 700; }
    .wins { color: var(--gold); font-weight: 700; }

    .alliances {
      margin: 0;
      padding-left: 18px;
      line-height: 1.7;
      color: #d4e4f4;
    }

    .alliances b { color: var(--accent); }

    .mode-switcher {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 10px;
    }

    .mode-btn {
      border: 1px solid #3e546f;
      border-radius: 10px;
      padding: 11px;
      background: linear-gradient(180deg, #27384e, #1b293b);
      color: #e9f4ff;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-btn.active {
      border-color: #6a91bc;
      box-shadow: inset 0 0 0 1px rgba(110,181,255,0.35);
    }

    @media (max-width: 760px) {
      .mode-switcher {
        grid-template-columns: 1fr;
      }

      .mode-image {
        height: 160px;
        font-size: 14px;
      }

      .title {
        font-size: 22px;
      }

      th,
      td {
        font-size: 13px;
        padding: 9px 8px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <header class="panel topbar">
      <div class="brand">DarkRevolt</div>
      <a class="back" href="index.html">На главную</a>
    </header>

    <section class="panel">
      <h1 class="title" id="modeTitle">BedWars</h1>
      <div class="mode-image" id="modeImageLabel">BEDWARS ARENA</div>
    </section>

    <section class="panel">
      <h2>Описание</h2>
      <p class="description" id="modeDescription">Командная игра, нужно уничтожить кровать врага и защитить свою.</p>
    </section>

    <section class="panel">
      <h2>Правила режима</h2>
      <ul class="rules" id="modeRules"></ul>
    </section>

    <section class="panel">
      <h2 id="topTitle">Топ игроков в BedWars</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Место</th>
              <th>Ник</th>
              <th>Победы</th>
              <th>Убийства</th>
              <th>Смерти</th>
            </tr>
          </thead>
          <tbody id="topBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>Альянсы в этом режиме</h2>
      <ul class="alliances" id="alliancesList"></ul>
    </section>

    <section class="panel">
      <h2>Режимы</h2>
      <div class="mode-switcher" id="modeSwitcher">
        <button class="mode-btn active" data-mode="bedwars" type="button">BedWars</button>
        <button class="mode-btn" data-mode="skywars" type="button">SkyWars</button>
        <button class="mode-btn" data-mode="anarchy" type="button">Anarchy</button>
      </div>
    </section>
  </main>

  <script>
    const modesData = {
      bedwars: {
        title: "BedWars",
        imageLabel: "BEDWARS ARENA",
        description: "Командная игра, нужно уничтожить кровать врага и защитить свою.",
        rules: [
          "Не ломать чужие кровати до начала игры",
          "Запрещено гриферство",
          "Максимум 4 игрока в команде"
        ],
        topTitle: "Топ игроков в BedWars",
        top: [
          { place: 1, nick: "AlphaKz", wins: 128, kills: 1542, deaths: 321 },
          { place: 2, nick: "StoneRider", wins: 97, kills: 1321, deaths: 287 },
          { place: 3, nick: "M1nerFox", wins: 84, kills: 1123, deaths: 256 }
        ],
        alliances: [
          "DarkSquad (участники: AlphaKz, StoneRider, M1nerFox)",
          "NoobKillers (участники: ZhanPro, DarkWizard)"
        ]
      },
      skywars: {
        title: "SkyWars",
        imageLabel: "SKYWARS ISLANDS",
        description: "Быстрые сражения на островах: лут в центре, контроль высоты и тактические дуэли.",
        rules: [
          "Запрещены баг-абузы карт",
          "Запрещено покидать бой для избегания смерти",
          "Соблюдайте спортивное поведение"
        ],
        topTitle: "Топ игроков в SkyWars",
        top: [
          { place: 1, nick: "CloudReaper", wins: 101, kills: 1320, deaths: 340 },
          { place: 2, nick: "ArrowZen", wins: 94, kills: 1248, deaths: 315 },
          { place: 3, nick: "DriftBlade", wins: 83, kills: 1117, deaths: 301 }
        ],
        alliances: [
          "SkyRaiders (участники: CloudReaper, ArrowZen)",
          "VoidKnights (участники: DriftBlade, ZeroFox)"
        ]
      },
      anarchy: {
        title: "Anarchy",
        imageLabel: "ANARCHY WASTELAND",
        description: "Суровое выживание с клановыми войнами, рейдами баз и минимальными ограничениями.",
        rules: [
          "Запрещены читы и дюпы",
          "Запрещены реальные угрозы",
          "Лаг-машины запрещены"
        ],
        topTitle: "Топ игроков в Anarchy",
        top: [
          { place: 1, nick: "RustSoul", wins: 68, kills: 1490, deaths: 702 },
          { place: 2, nick: "VoidNomad", wins: 56, kills: 1308, deaths: 665 },
          { place: 3, nick: "IronWrath", wins: 49, kills: 1214, deaths: 638 }
        ],
        alliances: [
          "RedBanner (участники: RustSoul, IronWrath)",
          "NorthLegion (участники: VoidNomad, DarkNomad)"
        ]
      }
    };

    const titleEl = document.getElementById("modeTitle");
    const imageLabelEl = document.getElementById("modeImageLabel");
    const descriptionEl = document.getElementById("modeDescription");
    const rulesEl = document.getElementById("modeRules");
    const topTitleEl = document.getElementById("topTitle");
    const topBodyEl = document.getElementById("topBody");
    const alliancesEl = document.getElementById("alliancesList");
    const modeButtons = document.querySelectorAll(".mode-btn");

    function renderMode(modeKey) {
      const mode = modesData[modeKey];
      if (!mode) {
        return;
      }

      titleEl.textContent = mode.title;
      imageLabelEl.textContent = mode.imageLabel;
      descriptionEl.textContent = mode.description;
      topTitleEl.textContent = mode.topTitle;

      rulesEl.innerHTML = "";
      mode.rules.forEach((rule) => {
        const li = document.createElement("li");
        li.textContent = rule;
        rulesEl.appendChild(li);
      });

      topBodyEl.innerHTML = "";
      mode.top.forEach((player) => {
        const row = document.createElement("tr");
        row.innerHTML =
          "<td>" + player.place + "</td>" +
          "<td>" + player.nick + "</td>" +
          "<td class='wins'>" + player.wins + "</td>" +
          "<td class='kills'>" + player.kills + "</td>" +
          "<td>" + player.deaths + "</td>";
        topBodyEl.appendChild(row);
      });

      alliancesEl.innerHTML = "";
      mode.alliances.forEach((alliance) => {
        const li = document.createElement("li");
        li.innerHTML = "<b>" + alliance.split(" (")[0] + "</b>" + alliance.slice(alliance.indexOf(" ("));
        alliancesEl.appendChild(li);
      });

      modeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === modeKey);
      });
    }

    modeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        renderMode(btn.dataset.mode);
      });
    });

    renderMode("bedwars");
  </script>
</body>
</html>
